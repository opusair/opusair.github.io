    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --background-color: #f8f9fa;
            --card-background-color: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 0, 0, 0.075);
            --hover-shadow-color: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            line-height: 1.7;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            font-weight: 400;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
        }

        .header h1 {
            font-size: 3.5em;
            font-weight: 700;
            margin: 0 0 15px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.3em;
            margin: 0;
            opacity: 0.9;
        }

        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .language-switch a {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.3s ease;
            border: 2px solid transparent;
        }

        .language-switch a:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .language-switch a.active {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .quick-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .quick-link {
            background: var(--card-background-color);
            padding: 20px 30px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
        }

        .quick-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--hover-shadow-color);
            border-color: var(--primary-color);
        }

        .quick-link.primary {
            background: var(--primary-color);
            color: white;
        }

        .quick-link.github {
            background: #28a745;
            color: #fff;
        }

        .quick-link.about {
            background: #ff9800;
            color: #fff;
        }

        .date-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .date-card {
            background: var(--card-background-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px var(--shadow-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .date-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px var(--hover-shadow-color);
        }

        .date-card h3 {
            font-size: 1.8em;
            font-weight: 600;
            margin: 0 0 15px 0;
            color: var(--primary-color);
        }

        .date-card .meta {
            color: var(--secondary-color);
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .date-card .preview {
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .date-card .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9em;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
        }

        .stats {
            background: var(--card-background-color);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .stats h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0;
        }

        .stat-label {
            color: var(--secondary-color);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5em;
            }
            
            .header p {
                font-size: 1.1em;
            }
            
            .date-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-links {
                flex-direction: column;
                align-items: center;
            }

            .language-switch {
                position: static;
                justify-content: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>

        // 更新统计数据
        function updateStats() {
            const totalReports = reports.length;
            const totalArticles = reports.reduce((sum, report) => sum + report.articleCount, 0);
            const latestDate = reports[0].date;
            
            // 基础统计
            document.getElementById('total-reports').textContent = totalReports;
            document.getElementById('total-articles').textContent = totalArticles;
            document.getElementById('latest-date').textContent = latestDate.replace(/(\d{4})-(\d{2})-(\d{2})/, '$2/$3');
            
            // 获取Google Analytics数据
            updateGAStats();
        }

        // 获取真实的Google Analytics统计数据
        function updateGAStats() {
            // 发送GA事件（用于追踪，但不用于显示）
            if (typeof gtag === 'function') {
                gtag('event', 'page_view', {
                    'send_to': 'G-008T4WC27P',
                    'page_title': 'NO-FOMO AI 日报 - 主页',
                    'page_location': window.location.href
                });
            }
            
            // 启动自动刷新统计数据（每30秒）
            startAutoRefresh();
        }

        // 从JSON文件加载真实的Analytics数据
        async function loadRealAnalyticsData() {
            try {
                // 添加时间戳防止缓存
                const timestamp = new Date().getTime();
                const response = await fetch(`./analytics-stats.json?t=${timestamp}`);
                if (!response.ok) {
                    throw new Error('无法加载统计数据');
                }
                
                const data = await response.json();
                
                // 更新显示
                document.getElementById('total-visits').textContent = formatNumber(data.totalVisits || 0);
                document.getElementById('today-visits').textContent = formatNumber(data.todayVisits || 0);
                
                // 显示最后更新时间
                const lastUpdated = new Date(data.lastUpdated);
                if (data.lastUpdated) {
                    console.log(`📊 统计数据最后更新: ${lastUpdated.toLocaleString('zh-CN')}`);
                }
                
            } catch (error) {
                console.error('加载统计数据失败:', error);
                
                // 如果加载失败，显示占位符
                document.getElementById('total-visits').textContent = '...';
                document.getElementById('today-visits').textContent = '...';
                
                // 尝试从本地存储获取备用数据（向后兼容）
                loadFallbackData();
            }
        }

        // 每30秒自动刷新统计数据
        function startAutoRefresh() {
            // 立即加载一次数据
            loadRealAnalyticsData();
            
            // 设置定时器，每30秒刷新一次
            setInterval(async () => {
                console.log('🔄 自动刷新统计数据...');
                await loadRealAnalyticsData();
            }, 30000); // 30秒 = 30000毫秒
        }

        // 备用数据加载（向后兼容）
        function loadFallbackData() {
            console.log('⚠️ 无法加载统计数据，显示默认值');
            document.getElementById('total-visits').textContent = '-';
            document.getElementById('today-visits').textContent = '-';
        }

        // 格式化数字显示
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // 生成日期卡片
        function generateDateCards() {
            const dateList = document.getElementById('date-list');

            // 生成卡片
            reports.forEach((report, index) => {
                const isNew = index === 0;
                const formattedDate = formatDate(report.date);
                
                // 确定链接路径 - 主版本为中文版
                let linkPath = `${report.date}/`;
                
                const card = document.createElement('div');
                card.className = 'date-card';
                card.innerHTML = `
                    <h3>${formattedDate} ${isNew ? '🆕' : ''}</h3>
                    <div class="meta">
                        📝 ${report.articleCount} 篇文章 | 
                        📊 ${report.sources.length} 个来源 | 
                        🏷️ ${report.sources.join(', ')}
                    </div>
                    <div class="preview">${report.description}</div>
                    <div class="actions">
                        <a href="${linkPath}" class="btn btn-primary">📖 阅读日报</a>
                        <a href="${linkPath}" class="btn btn-outline">🔗 分享链接</a>
                    </div>
                `;
                
                dateList.appendChild(card);
            });
        }

        // 格式化日期显示
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            };
            return date.toLocaleDateString('zh-CN', options);
        }

        // 页面加载完成后生成内容
        document.addEventListener('DOMContentLoaded', () => {
            generateDateCards();
            updateStats();
        });
    </script>
